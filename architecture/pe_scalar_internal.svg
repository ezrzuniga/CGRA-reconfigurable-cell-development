<text x="950.0" y="32" text-anchor="middle" font-family="sans-serif" font-size="25" font-weight="700" fill="#1f2937">PE_scalar -- arquitectura interna (con ALU_scalar)</text>

<text x="950.0" y="58" text-anchor="middle" font-family="sans-serif" font-size="13.5" font-weight="400" fill="#6b7280">PE_scalar&lt;DATA_W,NUM_REGS,INSTR_MEM_SIZE&gt;  |  load_program / pc_update / issue @ clk.pos()  +  writeback @ (alu valid, result)</text>

