<text x="430" y="151" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#1f2937">Instruction Memory</text>
<text x="430" y="170" text-anchor="middle" font-family="monospace" font-size="14" font-weight="400" fill="#6b7280">instr_mem[INSTR_MEM_SIZE]</text>
<text x="430" y="189" text-anchor="middle" font-family="monospace" font-size="14" font-weight="400" fill="#6b7280">load_program() @ clk.pos()</text>
<rect x="280" y="250" width="300" height="90" rx="10" fill="#f3f4f6" stroke="#374151" stroke-width="2"/>
<text x="430" y="276" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#1f2937">PC (program counter)</text>
<text x="430" y="295" text-anchor="middle" font-family="monospace" font-size="14" font-weight="400" fill="#6b7280">pc_update() @ clk.pos()</text>
<text x="430" y="314" text-anchor="middle" font-family="monospace" font-size="14" font-weight="400" fill="#6b7280">pc = (pc+1) % SIZE</text>
<rect x="660" y="130" width="290" height="130" rx="10" fill="#fce7f3" stroke="#be185d" stroke-width="2"/>
<text x="805" y="161.5" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#1f2937">cur_instr (latched)</text>
<text x="805" y="180.5" text-anchor="middle" font-family="monospace" font-size="13.5" font-weight="400" fill="#6b7280">issue() @ clk.pos()</text>
