<rect x="1020" y="610" width="260" height="160" rx="10" fill="#cffafe" stroke="#0e7490" stroke-width="2"/>
<text x="1150" y="641" text-anchor="middle" font-family="sans-serif" font-size="14.5" font-weight="700" fill="#1f2937">Accumulator (acc) -- NUEVO</text>
<text x="1150" y="662" text-anchor="middle" font-family="monospace" font-size="12.5" font-weight="400" fill="#6b7280">acc[VLEN], 1 por lane</text>
<text x="1150" y="682" text-anchor="middle" font-family="monospace" font-size="12" font-weight="400" fill="#6b7280">read: SRC_ACC (no destructivo)</text>
<text x="1150" y="700" text-anchor="middle" font-family="monospace" font-size="12" font-weight="400" fill="#6b7280">write: DST_ACC (directo) |</text>
<text x="1150" y="716" text-anchor="middle" font-family="monospace" font-size="12" font-weight="400" fill="#6b7280">OP_MAC (acc += a*b)</text>
<text x="1150" y="740" text-anchor="middle" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#0e7490">NO se limpia con rst</text>
<text x="1150" y="756" text-anchor="middle" font-family="sans-serif" font-size="11.5" font-weight="700" fill="#0e7490">(solo DST_ACC la reinicia)</text>
<rect x="1355" y="125" width="290" height="175" rx="12" fill="none" stroke="#1d4ed8" stroke-width="1.5"/>
