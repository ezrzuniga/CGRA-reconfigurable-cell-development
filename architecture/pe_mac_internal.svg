<text x="1500" y="180.5" text-anchor="middle" font-family="monospace" font-size="13" font-weight="400" fill="#6b7280">(submodulo aparte, combinacional)</text>
<text x="1500" y="199.5" text-anchor="middle" font-family="monospace" font-size="13" font-weight="400" fill="#6b7280">opcode, operand_a, operand_b,</text>
<text x="1500" y="218.5" text-anchor="middle" font-family="monospace" font-size="13" font-weight="400" fill="#6b7280">enable -&gt; result, valid, valid_toggle</text>
<text x="1500" y="240" text-anchor="middle" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#1d4ed8">OP_MAC: r=a*b (igual que OP_MUL,</text>
<text x="1500" y="256" text-anchor="middle" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#1d4ed8">el += NO vive aqui)</text>
<rect x="1355" y="605" width="290" height="170" rx="12" fill="none" stroke="#be185d" stroke-width="1.5"/>
<rect x="1360" y="610" width="280" height="160" rx="10" fill="#fce7f3" stroke="#be185d" stroke-width="2"/>
<text x="1500" y="641" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#1f2937">writeback()</text>
<text x="1500" y="660" text-anchor="middle" font-family="monospace" font-size="13" font-weight="400" fill="#6b7280">dst = REG/N/S/E/W/ALL/ACC</text>
<text x="1500" y="679" text-anchor="middle" font-family="monospace" font-size="12.5" font-weight="400" fill="#6b7280">OP_MAC: acc+=r ; r=acc</text>
<text x="1500" y="695" text-anchor="middle" font-family="monospace" font-size="12.5" font-weight="400" fill="#6b7280">(expone acc en el MISMO ciclo)</text>
<text x="1500" y="719" text-anchor="middle" font-family="sans-serif" font-size="13.5" font-weight="700" fill="#b91c1c">sensible a clk.neg()</text>
<text x="1500" y="736" text-anchor="middle" font-family="sans-serif" font-size="11.5" font-weight="700" fill="#b91c1c">(NO valid_toggle)</text>
