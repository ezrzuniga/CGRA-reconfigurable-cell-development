<text x="950.0" y="32" text-anchor="middle" font-family="sans-serif" font-size="25" font-weight="700" fill="#1f2937">PE_MAC -- arquitectura interna (con ALU_MAC + acumulador de 1 ciclo)</text>
<text x="950.0" y="58" text-anchor="middle" font-family="sans-serif" font-size="13.5" font-weight="400" fill="#6b7280">PE_MAC&lt;DATA_W,VLEN,NUM_REGS,INSTR_MEM_SIZE&gt;  |  load_program / pc_update / issue @ clk.pos()  +  writeback @ clk.neg()</text>
<rect x="700" y="74" width="500" height="30" rx="8" fill="#ecfeff" stroke="#0e7490" stroke-width="1.5" stroke-dasharray="5,3"/>
<text x="950" y="94" text-anchor="middle" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#0e7490">OP_MAC: acc = acc + a*b  --  multiplica + acumula + expone TODO en el mismo ciclo</text>
